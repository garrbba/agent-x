        /* Terminal Header */
        .header { padding: 20px; border-bottom: 1px solid var(--dim); background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; }
        .glitch { font-weight: bold; text-transform: uppercase; letter-spacing: 3px; animation: scan 2s infinite; }

        .chart-container { width: 95%; max-width: 1000px; height: 500px; border: 1px solid var(--dim); margin: 40px auto; background: #000; }

        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        @keyframes scan { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @media (max-width: 600px) { h1 { font-size: 1.5rem; } }
    </style>
</head>
